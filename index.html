<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Budget Bulanan • MEI 31 Hari</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #f5f3ef;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 16px;
      margin: 0;
    }

    .app-container {
      max-width: 580px;
      width: 100%;
      background: #ffffff;
      border-radius: 32px;
      box-shadow: 0 20px 35px rgba(0, 0, 0, 0.05), 0 8px 18px rgba(0, 0, 0, 0.03);
      padding: 20px 18px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      border: 1px solid #f0eae0;
    }

    .header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #3b3a36;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .header h1 span {
      background: #f2e3c6;
      font-size: 1rem;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 40px;
      color: #5e4b32;
      margin-left: 6px;
    }

    .tab-nav {
      display: flex;
      gap: 8px;
      background: #f0eae0;
      padding: 6px;
      border-radius: 30px;
      margin-bottom: 2px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      border-radius: 26px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      color: #6b5f4e;
      transition: all 0.2s ease;
    }

    .tab-btn.active {
      background: #ffffff;
      color: #3b362b;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .tab-btn:hover:not(.active) {
      background: rgba(255,255,255,0.5);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .summary-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .summary-card {
      flex: 1;
      min-width: 130px;
      background: linear-gradient(135deg, #f8f3e9 0%, #ede3d3 100%);
      border-radius: 20px;
      padding: 14px 16px;
      border: 1px solid #d6ccbc;
      text-align: center;
    }

    .summary-card .label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #6b5d48;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .summary-card .value {
      font-size: 1.5rem;
      font-weight: 800;
      color: #2a241a;
      margin-top: 2px;
    }

    .summary-card.sisa {
      background: linear-gradient(135deg, #e8f0e3 0%, #d4e4cc 100%);
      border-color: #bccfb0;
    }

    .summary-card.terpakai {
      background: linear-gradient(135deg, #fdf2ed 0%, #f5e0d5 100%);
      border-color: #e0c9b8;
    }

    .category-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 4px;
    }

    .category {
      background: #fbfaf7;
      border-radius: 22px;
      padding: 14px 14px 10px;
      border: 1px solid #e8dfd2;
      box-shadow: 0 3px 8px rgba(0,0,0,0.02);
    }

    .category-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      font-size: 1.15rem;
      margin-bottom: 10px;
      color: #3e3a31;
      border-bottom: 1px dashed #d9ccb7;
      padding-bottom: 6px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .category-summary {
      display: flex;
      gap: 8px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .category-summary span {
      background: #f3efe7;
      padding: 3px 10px;
      border-radius: 16px;
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.9rem;
      background: #ffffff;
      padding: 8px 10px;
      border-radius: 14px;
      border: 1px solid #efe7da;
      transition: background 0.15s;
      flex-wrap: wrap;
      gap: 4px;
    }

    .item-row:hover {
      background: #faf7f2;
    }

    .item-name {
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 500;
      color: #4a4236;
      flex: 2;
      min-width: 120px;
      cursor: pointer;
    }

    .item-name:hover {
      color: #2a241a;
    }

    .item-calculation {
      font-size: 0.7rem;
      color: #8c8070;
      margin-left: 2px;
      font-weight: 400;
    }

    .item-budget {
      font-weight: 600;
      color: #5e5340;
      font-size: 0.8rem;
      margin-left: auto;
      margin-right: 6px;
      white-space: nowrap;
    }

    /* Group untuk input terpakai + tombol konfirmasi */
    .terpakai-group {
      display: flex;
      align-items: center;
      gap: 2px;
      margin: 0 4px;
    }

    .item-terpakai-input {
      width: 90px;
      padding: 6px 8px;
      border: 1px solid #dbcfbc;
      border-radius: 20px;
      font-size: 0.8rem;
      text-align: right;
      background: #fefdfb;
      outline: none;
    }

    .item-terpakai-input:focus {
      border-color: #b9a382;
      box-shadow: 0 0 0 2px rgba(185, 163, 130, 0.15);
    }

    .item-terpakai-input.over-budget {
      border-color: #c45a4a;
      background: #fff5f3;
    }

    .confirm-terpakai-btn {
      background: #e4d5bd;
      border: 1px solid #c6b395;
      color: #2f2a21;
      font-weight: 700;
      font-size: 0.9rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }

    .confirm-terpakai-btn:hover {
      background: #dacaa9;
      border-color: #af9b7b;
    }

    .confirm-terpakai-btn.saved {
      background: #c5d8b7;
      border-color: #9bb87f;
      animation: popFlash 0.4s ease;
    }

    @keyframes popFlash {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .action-btns {
      display: flex;
      align-items: center;
      gap: 2px;
    }

    .edit-btn, .delete-btn {
      background: transparent;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 50%;
      transition: 0.2s;
      line-height: 1;
    }

    .edit-btn {
      color: #b9a382;
    }

    .edit-btn:hover {
      color: #8b744a;
      background: #f5efe2;
    }

    .delete-btn {
      color: #b8aa8f;
    }

    .delete-btn:hover {
      color: #b15e4a;
      background: #faeae4;
    }

    .add-item-form {
      display: flex;
      margin-top: 12px;
      gap: 6px;
      flex-wrap: wrap;
    }

    .add-item-form input {
      flex: 2;
      min-width: 100px;
      background: #fefdfb;
      border: 1px solid #dbcfbc;
      border-radius: 30px;
      padding: 10px 14px;
      font-size: 0.9rem;
      outline: none;
      background: #fff;
    }

    .add-item-form input:focus {
      border-color: #b9a382;
      box-shadow: 0 0 0 3px rgba(185, 163, 130, 0.2);
    }

    .btn {
      background: #cfbea2;
      border: none;
      color: #2f2a21;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 30px;
      background: #e4d5bd;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: 0.2s;
      border: 1px solid #c6b395;
      white-space: nowrap;
    }

    .btn:hover {
      background: #dacaa9;
      border-color: #af9b7b;
    }

    .reset-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #cdbc9f;
      color: #5f5340;
    }

    .note {
      font-size: 0.7rem;
      color: #a4967c;
      margin-top: 4px;
      text-align: center;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-box {
      background: #fff;
      border-radius: 24px;
      padding: 24px 20px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .modal-box h3 {
      margin-bottom: 16px;
      color: #3b3a36;
    }

    .modal-box input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #dbcfbc;
      border-radius: 30px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      outline: none;
    }

    .modal-box input:focus {
      border-color: #b9a382;
      box-shadow: 0 0 0 3px rgba(185, 163, 130, 0.2);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
    }

    .btn-cancel {
      background: #e5daca;
      border: 1px solid #cdbc9f;
    }

    /* Monitoring table */
    .monitoring-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin-top: 8px;
    }

    .monitoring-table th {
      background: #f3efe7;
      padding: 10px 8px;
      text-align: left;
      font-weight: 700;
      color: #4e4538;
      border-bottom: 2px solid #d6ccbc;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .monitoring-table td {
      padding: 10px 8px;
      border-bottom: 1px solid #efe7da;
      color: #3e3a31;
    }

    .monitoring-table .text-right {
      text-align: right;
    }

    .monitoring-table .text-center {
      text-align: center;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.75rem;
    }

    .badge-aman {
      background: #d4e4cc;
      color: #4a6b3a;
    }

    .badge-warning {
      background: #fdf0d5;
      color: #8a6d2b;
    }

    .badge-danger {
      background: #fae4df;
      color: #a84433;
    }

    .monitoring-category-header {
      background: #fbfaf7;
      font-weight: 700;
      color: #3e3a31;
    }

    .monitoring-category-header td {
      padding: 12px 8px;
      border-bottom: 1px solid #d6ccbc;
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>
      📒 Budget MEI
      <span>31 Hari</span>
    </h1>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="catatan">📝 Catatan</button>
    <button class="tab-btn" data-tab="monitoring">📊 Monitoring</button>
  </div>

  <div class="tab-content active" id="tab-catatan">
    <div class="summary-row">
      <div class="summary-card">
        <div class="label">💰 Total Budget</div>
        <div class="value" id="totalBudgetDisplay">Rp 0</div>
      </div>
      <div class="summary-card terpakai">
        <div class="label">💸 Sudah Terpakai</div>
        <div class="value" id="totalTerpakaiDisplay">Rp 0</div>
      </div>
      <div class="summary-card sisa">
        <div class="label">🏦 Sisa Budget</div>
        <div class="value" id="totalSisaDisplay">Rp 0</div>
      </div>
    </div>

    <div id="categoriesContainer" class="category-grid"></div>

    <div class="reset-area">
      <button class="btn btn-outline" id="resetToDefaultBtn">↺ Kembali ke Data Awal</button>
    </div>
    <div class="note">
      ✎ Klik nama item untuk edit • Isi "Terpakai" lalu klik ✔ untuk konfirmasi
    </div>
  </div>

  <div class="tab-content" id="tab-monitoring">
    <div class="summary-row" style="margin-bottom: 8px;">
      <div class="summary-card">
        <div class="label">💰 Total Budget</div>
        <div class="value" id="monTotalBudget">Rp 0</div>
      </div>
      <div class="summary-card terpakai">
        <div class="label">💸 Terpakai</div>
        <div class="value" id="monTotalTerpakai">Rp 0</div>
      </div>
      <div class="summary-card sisa">
        <div class="label">🏦 Sisa</div>
        <div class="value" id="monTotalSisa">Rp 0</div>
      </div>
    </div>
    <div style="overflow-x: auto;">
      <div id="monitoringTableContainer"></div>
    </div>
    <p class="note" style="margin-top: 12px;">
      💡 Status: 🟢 Aman (≤80%) • 🟡 Hampir (81-99%) • 🔴 Over (≥100%)
    </p>
  </div>
</div>

<div class="modal-overlay" id="editModal" style="display: none;">
  <div class="modal-box">
    <h3>✏️ Edit Item</h3>
    <label style="font-weight: 600; font-size: 0.9rem; color: #4e4538;">Nama Item</label>
    <input type="text" id="editItemName" placeholder="Nama item" maxlength="40">
    <label style="font-weight: 600; font-size: 0.9rem; color: #4e4538;">Budget (Rp)</label>
    <input type="number" id="editItemPrice" placeholder="Budget" min="0" step="1">
    <label style="font-weight: 600; font-size: 0.9rem; color: #4e4538;">Catatan (opsional)</label>
    <input type="text" id="editItemNote" placeholder="Misal: 10rb x8" maxlength="60">
    <div class="modal-actions">
      <button class="btn btn-cancel" id="cancelEditBtn">Batal</button>
      <button class="btn" id="saveEditBtn">💾 Simpan</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const initialCategories = [
      {
        name: "Dokok",
        items: [
          { name: "Benzin", price: 250000, note: "", terpakai: 0 },
          { name: "Minyak", price: 80000, note: "", terpakai: 0 },
          { name: "Beras", price: 100000, note: "", terpakai: 0 }
        ]
      },
      {
        name: "Keselamatan",
        items: [
          { name: "Telur (6 kg)", price: 200000, note: "", terpakai: 0 },
          { name: "Pisang (10rb x4)", price: 40000, note: "", terpakai: 0 },
          { name: "Hum (15rb/5rb x8)", price: 40000, note: "", terpakai: 0 },
          { name: "Ayam 1 kg", price: 400000, note: "", terpakai: 0 },
          { name: "Buah (10rb x8)", price: 80000, note: "", terpakai: 0 },
          { name: "Ikan (10rb x9)", price: 90000, note: "", terpakai: 0 }
        ]
      },
      {
        name: "Acara Dadakan",
        items: [
          { name: "Buku/humbugan acara", price: 200000, note: "", terpakai: 0 }
        ]
      },
      {
        name: "Daily",
        items: [
          { name: "Tempe (35x12)", price: 36000, note: "", terpakai: 0 },
          { name: "Sayur (50x12)", price: 60000, note: "", terpakai: 0 },
          { name: "Kelapa (50x8)", price: 40000, note: "", terpakai: 0 },
          { name: "Santan (30x4)", price: 12000, note: "", terpakai: 0 },
          { name: "Pindang (10x9)", price: 90000, note: "", terpakai: 0 },
          { name: "Tahu (45x16)", price: 64000, note: "", terpakai: 0 },
          { name: "Tomat (50x9)", price: 20000, note: "", terpakai: 0 },
          { name: "Kentang (85x9)", price: 32000, note: "", terpakai: 0 },
          { name: "Ceker (5x9)", price: 20000, note: "", terpakai: 0 },
          { name: "Kopi (10x8)", price: 80000, note: "", terpakai: 0 }
        ]
      },
      {
        name: "Ayan",
        items: [
          { name: "Mie ayam (20x9)", price: 40000, note: "", terpakai: 0 },
          { name: "Tumyang (7x8)", price: 56000, note: "", terpakai: 0 },
          { name: "Susu melutam (16x2)", price: 32000, note: "", terpakai: 0 },
          { name: "Nasi goreng (11x4)", price: 44000, note: "", terpakai: 0 },
          { name: "Parupir (20x9)", price: 180000, note: "", terpakai: 0 }
        ]
      }
    ];

    let categories = JSON.parse(JSON.stringify(initialCategories));

    const container = document.getElementById('categoriesContainer');
    const editModal = document.getElementById('editModal');
    const editItemName = document.getElementById('editItemName');
    const editItemPrice = document.getElementById('editItemPrice');
    const editItemNote = document.getElementById('editItemNote');
    const monitoringTableContainer = document.getElementById('monitoringTableContainer');

    let currentEditCatIndex = null;
    let currentEditItemIndex = null;

    function formatRupiah(angka) {
      return 'Rp ' + Number(angka).toLocaleString('id-ID');
    }

    function getCategoryBudget(items) {
      return items.reduce((sum, item) => sum + (Number(item.price) || 0), 0);
    }

    function getCategoryTerpakai(items) {
      return items.reduce((sum, item) => sum + (Number(item.terpakai) || 0), 0);
    }

    function getTotalBudget() {
      return categories.reduce((sum, cat) => sum + getCategoryBudget(cat.items), 0);
    }

    function getTotalTerpakai() {
      return categories.reduce((sum, cat) => sum + getCategoryTerpakai(cat.items), 0);
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function saveToLocalStorage() {
      try {
        localStorage.setItem('budget_mei_data_v3', JSON.stringify(categories));
      } catch (e) {}
    }

    function loadFromStorage() {
      try {
        const stored = localStorage.getItem('budget_mei_data_v3');
        if (stored) {
          categories = JSON.parse(stored);
        } else {
          categories = JSON.parse(JSON.stringify(initialCategories));
        }
      } catch (e) {
        categories = JSON.parse(JSON.stringify(initialCategories));
      }
    }

    function updateSummaries() {
      const totalBudget = getTotalBudget();
      const totalTerpakai = getTotalTerpakai();
      const totalSisa = totalBudget - totalTerpakai;

      document.getElementById('totalBudgetDisplay').textContent = formatRupiah(totalBudget);
      document.getElementById('totalTerpakaiDisplay').textContent = formatRupiah(totalTerpakai);
      document.getElementById('totalSisaDisplay').textContent = formatRupiah(totalSisa);

      document.getElementById('monTotalBudget').textContent = formatRupiah(totalBudget);
      document.getElementById('monTotalTerpakai').textContent = formatRupiah(totalTerpakai);
      document.getElementById('monTotalSisa').textContent = formatRupiah(totalSisa);
    }

    function updateCategoryHeaderDOM(categoryDiv, categoryIndex) {
      const category = categories[categoryIndex];
      const catBudget = getCategoryBudget(category.items);
      const catTerpakai = getCategoryTerpakai(category.items);
      
      const summaryDiv = categoryDiv.querySelector('.category-summary');
      if (summaryDiv) {
        summaryDiv.innerHTML = `
          <span>Budget: ${formatRupiah(catBudget)}</span>
          <span>Terpakai: ${formatRupiah(catTerpakai)}</span>
        `;
      }
    }

    // Konfirmasi terpakai: update data lalu render ulang monitoring & summary saja (bukan full render catatan)
    function confirmTerpakai(categoryIndex, itemIndex, value, confirmBtn) {
      let val = parseInt(value, 10);
      if (isNaN(val) || val < 0) {
        val = 0;
      }
      categories[categoryIndex].items[itemIndex].terpakai = val;
      
      // Flash hijau pada tombol
      confirmBtn.classList.add('saved');
      setTimeout(() => {
        confirmBtn.classList.remove('saved');
      }, 500);
      
      // Update summary & monitoring saja (tidak render ulang catatan)
      updateSummaries();
      
      // Update header kategori yang bersangkutan
      const allCategories = container.querySelectorAll('.category');
      if (allCategories[categoryIndex]) {
        updateCategoryHeaderDOM(allCategories[categoryIndex], categoryIndex);
      }
      
      renderMonitoringTable();
      saveToLocalStorage();
    }

    function renderCategories() {
      if (!container) return;
      container.innerHTML = '';

      categories.forEach((category, categoryIndex) => {
        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'category';

        const catBudget = getCategoryBudget(category.items);
        const catTerpakai = getCategoryTerpakai(category.items);

        const headerDiv = document.createElement('div');
        headerDiv.className = 'category-header';
        headerDiv.innerHTML = `
          <span>📌 ${escapeHtml(category.name)}</span>
          <div class="category-summary">
            <span>Budget: ${formatRupiah(catBudget)}</span>
            <span>Terpakai: ${formatRupiah(catTerpakai)}</span>
          </div>
        `;

        const itemListDiv = document.createElement('div');
        itemListDiv.className = 'item-list';

        category.items.forEach((item, itemIndex) => {
          const itemRow = document.createElement('div');
          itemRow.className = 'item-row';

          const nameSpan = document.createElement('span');
          nameSpan.className = 'item-name';
          nameSpan.innerHTML = `${escapeHtml(item.name)}${item.note ? `<span class="item-calculation">${escapeHtml(item.note)}</span>` : ''}`;
          nameSpan.title = 'Klik untuk edit';
          nameSpan.addEventListener('click', () => openEditModal(categoryIndex, itemIndex));

          const budgetSpan = document.createElement('span');
          budgetSpan.className = 'item-budget';
          budgetSpan.textContent = formatRupiah(item.price);

          // Group: input + tombol konfirmasi
          const terpakaiGroup = document.createElement('div');
          terpakaiGroup.className = 'terpakai-group';

          const terpakaiInput = document.createElement('input');
          terpakaiInput.type = 'number';
          terpakaiInput.className = 'item-terpakai-input';
          terpakaiInput.value = item.terpakai || 0;
          terpakaiInput.min = '0';
          terpakaiInput.step = '1';
          terpakaiInput.placeholder = 'Terpakai';
          terpakaiInput.title = 'Uang yang sudah dikeluarkan';
          
          // Tandai over-budget saat render awal
          if ((item.terpakai || 0) > item.price) {
            terpakaiInput.classList.add('over-budget');
          }

          const confirmBtn = document.createElement('button');
          confirmBtn.className = 'confirm-terpakai-btn';
          confirmBtn.innerHTML = '✔';
          confirmBtn.title = 'Konfirmasi terpakai';
          confirmBtn.type = 'button';

          // Event: klik tombol konfirmasi
          confirmBtn.addEventListener('click', (e) => {
            e.preventDefault();
            const inputVal = terpakaiInput.value;
            // Update over-budget class
            const numVal = parseInt(inputVal, 10) || 0;
            if (numVal > item.price) {
              terpakaiInput.classList.add('over-budget');
            } else {
              terpakaiInput.classList.remove('over-budget');
            }
            confirmTerpakai(categoryIndex, itemIndex, inputVal, confirmBtn);
          });

          // Event: tekan Enter pada input
          terpakaiInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
              e.preventDefault();
              confirmBtn.click();
            }
          });

          terpakaiGroup.appendChild(terpakaiInput);
          terpakaiGroup.appendChild(confirmBtn);

          const actionDiv = document.createElement('div');
          actionDiv.className = 'action-btns';

          const editBtn = document.createElement('button');
          editBtn.className = 'edit-btn';
          editBtn.innerHTML = '✎';
          editBtn.title = 'Edit item';
          editBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            openEditModal(categoryIndex, itemIndex);
          });

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.innerHTML = '✕';
          deleteBtn.title = 'Hapus item';
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteItem(categoryIndex, itemIndex);
          });

          actionDiv.appendChild(editBtn);
          actionDiv.appendChild(deleteBtn);
          itemRow.appendChild(nameSpan);
          itemRow.appendChild(budgetSpan);
          itemRow.appendChild(terpakaiGroup);
          itemRow.appendChild(actionDiv);
          itemListDiv.appendChild(itemRow);
        });

        const addForm = document.createElement('div');
        addForm.className = 'add-item-form';
        addForm.innerHTML = `
          <input type="text" placeholder="Nama item" class="new-item-name" maxlength="40">
          <input type="number" placeholder="Budget (Rp)" class="new-item-price" min="0" step="1" value="">
          <button class="btn add-item-btn">+ Tambah</button>
        `;

        const nameInput = addForm.querySelector('.new-item-name');
        const priceInput = addForm.querySelector('.new-item-price');
        const addButton = addForm.querySelector('.add-item-btn');

        addButton.addEventListener('click', () => {
          const name = nameInput.value.trim();
          const price = parseInt(priceInput.value, 10);
          if (name === '' || isNaN(price) || price < 0) {
            alert('Masukkan nama dan budget yang valid (angka >= 0)');
            return;
          }
          categories[categoryIndex].items.push({ name, price, note: '', terpakai: 0 });
          nameInput.value = '';
          priceInput.value = '';
          saveAndFullRender();
        });

        priceInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') addButton.click();
        });
        nameInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') priceInput.focus();
        });

        categoryDiv.appendChild(headerDiv);
        categoryDiv.appendChild(itemListDiv);
        categoryDiv.appendChild(addForm);
        container.appendChild(categoryDiv);
      });

      updateSummaries();
      renderMonitoringTable();
    }

    function renderMonitoringTable() {
      if (!monitoringTableContainer) return;

      let html = '<table class="monitoring-table"><thead><tr>';
      html += '<th>Item</th><th class="text-right">Budget</th><th class="text-right">Terpakai</th><th class="text-right">Sisa</th><th class="text-center">Status</th>';
      html += '</tr></thead><tbody>';

      categories.forEach(category => {
        const catBudget = getCategoryBudget(category.items);
        const catTerpakai = getCategoryTerpakai(category.items);
        const catSisa = catBudget - catTerpakai;
        const catPersen = catBudget > 0 ? (catTerpakai / catBudget) * 100 : 0;
        let catBadge = '';
        if (catPersen >= 100) catBadge = '<span class="badge badge-danger">🔴 Over</span>';
        else if (catPersen > 80) catBadge = '<span class="badge badge-warning">🟡 Hampir</span>';
        else catBadge = '<span class="badge badge-aman">🟢 Aman</span>';

        html += `<tr class="monitoring-category-header">`;
        html += `<td colspan="5">📌 <strong>${escapeHtml(category.name)}</strong> &nbsp; ${catBadge} &nbsp; Budget: ${formatRupiah(catBudget)} | Terpakai: ${formatRupiah(catTerpakai)} | Sisa: ${formatRupiah(catSisa)}</td>`;
        html += `</tr>`;

        category.items.forEach(item => {
          const sisa = item.price - (item.terpakai || 0);
          const persen = item.price > 0 ? ((item.terpakai || 0) / item.price) * 100 : 0;
          let badge = '';
          if (persen >= 100) badge = '<span class="badge badge-danger">🔴 Over</span>';
          else if (persen > 80) badge = '<span class="badge badge-warning">🟡 Hampir</span>';
          else badge = '<span class="badge badge-aman">🟢 Aman</span>';

          html += '<tr>';
          html += `<td>${escapeHtml(item.name)}${item.note ? `<br><small style="color:#8c8070;">${escapeHtml(item.note)}</small>` : ''}</td>`;
          html += `<td class="text-right">${formatRupiah(item.price)}</td>`;
          html += `<td class="text-right">${formatRupiah(item.terpakai || 0)}</td>`;
          html += `<td class="text-right">${formatRupiah(sisa)}</td>`;
          html += `<td class="text-center">${badge}</td>`;
          html += '</tr>';
        });
      });

      html += '</tbody></table>';
      monitoringTableContainer.innerHTML = html;
    }

    function deleteItem(catIndex, itemIndex) {
      if (!categories[catIndex]) return;
      categories[catIndex].items.splice(itemIndex, 1);
      saveAndFullRender();
    }

    function openEditModal(catIndex, itemIndex) {
      const item = categories[catIndex].items[itemIndex];
      currentEditCatIndex = catIndex;
      currentEditItemIndex = itemIndex;
      editItemName.value = item.name;
      editItemPrice.value = item.price;
      editItemNote.value = item.note || '';
      editModal.style.display = 'flex';
    }

    function closeEditModal() {
      editModal.style.display = 'none';
      currentEditCatIndex = null;
      currentEditItemIndex = null;
    }

    document.getElementById('cancelEditBtn').addEventListener('click', closeEditModal);
    editModal.addEventListener('click', (e) => {
      if (e.target === editModal) closeEditModal();
    });

    document.getElementById('saveEditBtn').addEventListener('click', () => {
      if (currentEditCatIndex === null || currentEditItemIndex === null) return;
      const newName = editItemName.value.trim();
      const newPrice = parseInt(editItemPrice.value, 10);
      const newNote = editItemNote.value.trim();
      if (newName === '' || isNaN(newPrice) || newPrice < 0) {
        alert('Nama dan budget harus valid');
        return;
      }
      categories[currentEditCatIndex].items[currentEditItemIndex].name = newName;
      categories[currentEditCatIndex].items[currentEditItemIndex].price = newPrice;
      categories[currentEditCatIndex].items[currentEditItemIndex].note = newNote;
      if (categories[currentEditCatIndex].items[currentEditItemIndex].terpakai > newPrice) {
        categories[currentEditCatIndex].items[currentEditItemIndex].terpakai = newPrice;
      }
      closeEditModal();
      saveAndFullRender();
    });

    document.getElementById('resetToDefaultBtn').addEventListener('click', () => {
      if (confirm('Kembalikan semua item ke data awal? Semua perubahan (termasuk "terpakai") akan hilang.')) {
        categories = JSON.parse(JSON.stringify(initialCategories));
        saveAndFullRender();
      }
    });

    const tabButtons = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const targetTab = btn.getAttribute('data-tab');
        tabButtons.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        if (targetTab === 'catatan') {
          document.getElementById('tab-catatan').classList.add('active');
        } else if (targetTab === 'monitoring') {
          document.getElementById('tab-monitoring').classList.add('active');
          updateSummaries();
          renderMonitoringTable();
        }
      });
    });

    // Full render (untuk tambah item, hapus, edit, reset)
    function saveAndFullRender() {
      saveToLocalStorage();
      renderCategories();
      updateSummaries();
      renderMonitoringTable();
    }

    loadFromStorage();
    renderCategories();
    updateSummaries();
    renderMonitoringTable();
  })();
</script>
</body>
</html>
